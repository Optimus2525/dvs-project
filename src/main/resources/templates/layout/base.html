<!DOCTYPE html>
<html lang="lv" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle : 'DVS Sistēma'}">DVS Sistēma</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Flatpickr CSS (Datumu ievadei) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- Šeit vēlāk tiks pievienots pašu rakstītais CSS fails -->
</head>
<body class="bg-light">

<!-- Augšējā navigācijas josla (Header) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/documents/dashboard">DVS Sistēma</a>
        <div class="d-flex">
                <span class="navbar-text text-white">
                    Sveiki, Lietotāj!
                </span>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Kreisā izvēlne (Sidebar) -->
        <div class="col-md-3 col-lg-2">
            <!-- Jauns bloks: Uzdevumi -->
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white fw-bold">
                    Uzdevumi
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item"><a href="/tasks/my-tasks" class="text-decoration-none text-dark">Mani uzdevumi</a></li>
                </ul>
            </div>
            <!-- Esošais bloks: Dokumentu Saraksti -->
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">
                    Dokumentu Saraksti
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item"><a href="#" class="text-decoration-none text-dark">Ienākošie 2026</a></li>
                    <li class="list-group-item"><a href="#" class="text-decoration-none text-dark">Rīkojumi</a></li>
                </ul>
            </div>
        </div>

        <!-- Galvenais saturs (Main Content), kas tiks ievietots no citiem skatiem -->
        <div class="col-md-9 col-lg-10">
            <div th:replace="${content}"></div>
        </div>
    </div>
</div>

<!-- Pievienots Footer ar dinamisko versiju -->
<footer class="mt-auto py-3 border-top mt-5">
    <div class="container-fluid text-center">
        <span class="text-muted" th:text="'DVS v ' + ${appVersion} + ' © ' + ${#dates.format(#dates.createNow(), 'yyyy')} + ' - Izstrādātājs - DVS system'">DVS v 1.0.0</span>
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/lv.js"></script>

<!-- Globālā Vanilla JS inicializācija -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Inicializē datuma laukus, lietotājam parādot Latvijas standartu
        flatpickr("input[type='date']", {
            locale: "lv",
            altInput: true,
            altFormat: "d.m.Y", // Vizuālais formāts lietotājam (dd.mm.yyyy)
            dateFormat: "Y-m-d" // Fona formāts standartizētai datu sūtīšanai
        });
    });
</script>
</body>
</html>
