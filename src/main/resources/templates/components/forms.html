<!DOCTYPE html>
<html lang="lv" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 1. Teksta ievades komponents -->
<div th:fragment="textInput(id, label, name, value, required)" class="mb-3">
    <label th:for="${id}" class="form-label fw-bold">
        <span th:text="${label}">Ievades lauks</span>
        <span th:if="${required}" class="text-danger">*</span>
    </label>
    <input type="text" class="form-control"
           th:id="${id}"
           th:name="${name}"
           th:value="${value}"
           th:required="${required}">
</div>

<!-- 2. Datuma ievades komponents (Flatpickr to automātiski atpazīs, jo type="date") -->
<div th:fragment="dateInput(id, label, name, value, required)" class="mb-3">
    <label th:for="${id}" class="form-label fw-bold">
        <span th:text="${label}">Datums</span>
        <span th:if="${required}" class="text-danger">*</span>
    </label>
    <input type="date" class="form-control"
           th:id="${id}"
           th:name="${name}"
           th:value="${value}"
           th:required="${required}">
</div>

<!-- 3. Izvēlnes (Dropdown / Uzmeklēšana) komponents -->
<div th:fragment="selectInput(id, label, name, optionsList, selectedValue, required)" class="mb-3">
    <label th:for="${id}" class="form-label fw-bold">
        <span th:text="${label}">Izvēlne</span>
        <span th:if="${required}" class="text-danger">*</span>
    </label>
    <select class="form-select" th:id="${id}" th:name="${name}" th:required="${required}">
        <option value="">-- Izvēlieties --</option>
        <!-- Dinamiski ģenerē opcijas no saraksta -->
        <option th:each="opt : ${optionsList}"
                th:value="${opt}"
                th:text="${opt}"
                th:selected="${opt == selectedValue}"></option>
    </select>
</div>

<!-- 4. Izvēles rūtiņas (Checkbox) komponents -->
<div th:fragment="checkboxInput(id, label, name, checked)" class="form-check mb-3">
    <input class="form-check-input" type="checkbox"
           th:id="${id}"
           th:name="${name}"
           th:checked="${checked}">
    <label class="form-check-label fw-bold" th:for="${id}" th:text="${label}">Izvēles rūtiņa</label>
</div>

<!-- 5. Teksta laukuma (Textarea) komponents -->
<div th:fragment="textareaInput(id, label, name, value, required, rows)" class="mb-3">
    <label th:for="${id}" class="form-label fw-bold">
        <span th:text="${label}">Teksta lauks</span>
        <span th:if="${required}" class="text-danger">*</span>
    </label>
    <textarea class="form-control"
              th:id="${id}"
              th:name="${name}"
              th:rows="${rows}"
              th:required="${required}"
              th:text="${value}"></textarea>
</div>

<!-- 6. Failu pievienošanas komponents -->
<div th:fragment="fileInput(id, label, name, required, multiple)" class="mb-3">
    <label th:for="${id}" class="form-label fw-bold">
        <span th:text="${label}">Pievienot failu</span>
        <span th:if="${required}" class="text-danger">*</span>
    </label>
    <input class="form-control" type="file"
           th:id="${id}"
           th:name="${name}"
           th:required="${required}"
           th:multiple="${multiple}">
</div>

</body>
</html>
